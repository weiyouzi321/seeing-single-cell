name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          BASE_PATH: /seeing-single-cell
          NEXT_PUBLIC_BASE_PATH: /seeing-single-cell
          NODE_ENV: production
        run: npm run build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Generate redirect pages
        run: |
          mkdir -p out/chapters/1-dimensionality-reduction
          mkdir -p out/chapters/3-clustering
          mkdir -p out/chapters/4-differential-expression
          mkdir -p out/chapters/5-trajectory
          
          create_redirect() {
            slug="$1"
            dest="$2"
            cat > "out/chapters/${slug}/index.html" << HTML
<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta http-equiv="refresh" content="0; url=../${dest}">
    <link rel="canonical" href="https://weiyouzi321.github.io/seeing-single-cell/chapters/${dest}">
    <title>正在跳转...</title>
    <meta name="robots" content="noindex,follow">
    <style>
      body { font-family: system-ui, sans-serif; text-align: center; padding: 50px; }
      a { color: #0066cc; }
    </style>
  </head>
  <body>
    <p>正在跳转到 <a href="../${dest}">../${dest}</a>...</p>
    <script>window.location.href = "../${dest}";</script>
  </body>
</html>
HTML
          done
          
          create_redirect "1-dimensionality-reduction" "1-matrix/"
          create_redirect "3-clustering" "3-preprocessing/"
          create_redirect "4-differential-expression" "4-pca/"
          create_redirect "5-trajectory" "5-knn/"
          
          echo "✅ 已创建 4 个重定向页面"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
